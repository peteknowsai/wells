#cloud-config
# Per-well cloud-init. Runs ONCE on first boot of a cloned disk.
# The base image is already baked with the preinstalled set; this layer
# is identity-only — hostname, ssh keys, machine-id, well user.
#
# Hostname comes from cidata's meta-data (set at seed-build time).
# Top-level ssh_authorized_keys and the /etc/well-authorized-keys
# write_files entry are composed in by lib/cloudInitWell.ts before
# the seed is built. Everything else is static.

# Wipe the host keys baked into the base image and regenerate ed25519
# only — each well gets its own host identity.
ssh_deletekeys: true
ssh_genkeytypes:
  - ed25519

# A new instance-id (fed via cidata) makes cloud-init treat this as a
# fresh instance: growpart runs, host keys regenerate, runcmd executes.
runcmd:
  # Fresh machine-id so DBus, journal, and anything keyed off it don't
  # collide across wells cloned from the same disk.
  - rm -f /etc/machine-id /var/lib/dbus/machine-id
  - systemd-machine-id-setup
  # Seed the metadata-server name. welld runs a tiny HTTP server on
  # the vmnet bridge IP for cooperation signals (/v1/cells/me/working,
  # /v1/cells/me/sleep). The vmnet gateway IS the host from the VM's
  # perspective, so we resolve it at first boot and pin host.well to
  # it. See docs/lifecycle.md.
  - sh -c 'echo "$(ip route show default | awk "/default/ {print \$3}" | head -1)  host.well" >> /etc/hosts'
  # Route .well queries to welld's bridge DNS (port 5353 on the same
  # gateway). Falls through to DHCP-supplied upstream for everything
  # else. systemd-resolved 253+ supports `IP:PORT` in DNS=. Restart
  # the resolver so the drop-in takes effect on first boot.
  - mkdir -p /etc/systemd/resolved.conf.d
  - sh -c 'GATEWAY=$(ip route show default | awk "/default/ {print \$3}" | head -1); printf "[Resolve]\nDNS=%s:5353\nDomains=~well\n" "$GATEWAY" > /etc/systemd/resolved.conf.d/well.conf'
  - systemctl restart systemd-resolved
  # Pinned-IP wells get a 99-wells-pinned.yaml dropped via write_files
  # (lib/cloudInitWell.ts). Apply it now. No-op for wells without that
  # file — netplan apply with no changes is fine.
  - netplan apply
  # Create a 512 MB swap file. Safety net for the rare working-set
  # spike that exceeds the default 1 GB allocation. Effective ceiling
  # becomes ~1.5 GB; pages out slowly under pressure rather than
  # OOM-killing. See docs/memory-budget.md.
  - test -f /swap.img || (fallocate -l 512M /swap.img && chmod 600 /swap.img && mkswap /swap.img && swapon /swap.img && echo '/swap.img none swap sw 0 0' >> /etc/fstab)
  # Well user — the agent user inside the well. Cells's birth flow
  # targets /home/well/agent, /home/well/.bashrc.d/, etc. We do this
  # in runcmd, not via the cloud-init `users:` module, because the
  # Ubuntu cloud image bakes in its own default user config and a second
  # `users:` document is ignored on first boot. The authorized_keys
  # source file is composed in via write_files.
  #
  # Each step guards against re-run: when a well is created from a
  # saved image (--from-image), cloud-init sees a new instance-id and
  # re-executes runcmd. The user, .ssh dir, and sudoers drop already
  # exist, so make the operations idempotent.
  - id -u well >/dev/null 2>&1 || useradd -m -s /bin/bash -d /home/well -G sudo well
  - install -d -o well -g well -m 0700 /home/well/.ssh
  - install -o well -g well -m 0600 /etc/well-authorized-keys /home/well/.ssh/authorized_keys
  - rm -f /etc/well-authorized-keys
  - sh -c 'echo "well ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/90-well'
  - chmod 440 /etc/sudoers.d/90-well
  # Marker for the host orchestrator: per-well first boot finished.
  - touch /etc/.well-ready
